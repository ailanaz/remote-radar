<!DOCTYPE html>


<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GAP — Global Alpha Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --base: #0B0F14;

    --bg: #0B0F14;
    --panel: rgba(255,255,255,0.03);
    --panel-alt: rgba(255,255,255,0.05);
    --module: rgba(0,230,216,0.04);
    --inset: rgba(0,0,0,0.32);
    --sidebar: #090B10;
    --border-inactive: rgba(255,255,255,0.08);
    --border-blue: #5C7AB8;
    --border-blue-soft: rgba(92,122,184,0.28);
    --blue-highlight: #00E6D8;
    --blue-highlight-soft: rgba(0,230,216,0.12);
    --signal-green: #00E6D8;
    --signal-green-soft: rgba(0,230,216,0.10);
    --accent: #00E6D8;
    --accent2: #FF6EC7;
    --accent3: #7C3AED;
    --glass-bg: rgba(255,255,255,0.03);
    --glass-border: rgba(0,230,216,0.08);
    --glass-hover: rgba(0,230,216,0.15);
    --glass-blur: blur(12px);
    --radius-card: 10px;
    --text-bright: #00E6D8;
    --text-mid: #9aa7b2;
    --text-dim: #5a6a7a;
    --text-ghost: #2e3d4d;
    --text: #cfeeea;
    --muted: #9aa7b2;
    --muted-dim: #5a6a72;
    --card: #0e1114;
    --mono: 'Geist Mono', monospace;
    --sans: Inter, system-ui;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; box-shadow: none !important; text-shadow: none !important; filter: none !important; }
  *::before, *::after { box-shadow: none !important; text-shadow: none !important; filter: none !important; }

  html, body { background: #0B0F14; background: var(--bg, #0B0F14); }

  body {
    font-family: var(--mono);
    background: var(--base);
    color: var(--text-bright);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 12px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  button, input, textarea, select { font-family: var(--mono); }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 28px;
    min-height: 70px;
    border-bottom: 2px solid var(--border-blue);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 34px; height: 34px;
    border: 2px solid var(--blue-highlight);
    background: var(--module);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    color: var(--blue-highlight);
    letter-spacing: 0.18em;
  }

  .logo-text { font-size: 13px; font-weight: 800; letter-spacing: 0.24em; color: var(--text-bright); text-transform: uppercase; }

  .logo-sub { display: block; font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
.logo-img {
  height: 80px;
  width: auto;
  display: block;
}
.logo-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-mid);
  white-space: nowrap;
}

  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }

  .header-readout {
    font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 10px; border: 1px solid var(--border-blue-soft); background: var(--module);
  }

  .header-readout strong { color: var(--blue-highlight); font-weight: 700; }

  .led-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--border-blue); padding: 6px 10px;
    border: 2px solid var(--border-blue-soft); background: var(--module);
  }

  .led-dot { width: 8px; height: 8px; background: var(--border-blue); animation: led-pulse 1.6s steps(2, end) infinite; }

  @keyframes led-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  nav { display: flex; gap: 0; padding: 0 28px; background: var(--panel); border-bottom: 1px solid var(--border-inactive); }

  .nav-tab {
    padding: 14px 18px; cursor: pointer; color: rgba(0,230,216,0.5);
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    border-right: 1px solid var(--border-inactive); border-bottom: 2px solid transparent;
    transition: border-color 0.12s ease, color 0.12s ease, background-color 0.12s ease;
    display: flex; align-items: center; gap: 8px;
    user-select: none; background: var(--panel); white-space: nowrap;
  }

  .nav-tab:hover { color: rgba(0,230,216,0.85); border-bottom-color: rgba(0,230,216,0.6); background: var(--module); }
  .nav-tab.active { color: var(--signal-green); border-bottom-color: var(--signal-green); background: var(--module); }

  .nav-count { font-size: 9px; font-weight: 700; padding: 2px 6px; background: var(--inset); border: 1px solid var(--blue-highlight-soft); color: var(--blue-highlight); }

  main { flex: 1; padding: 28px 32px 40px; max-width: 1480px; width: 100%; margin: 0 auto; }

  .view { display: none; }
  .view.active { display: block; }

  .section-header {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    margin-bottom: 24px; padding: 0 0 14px; border-bottom: 2px solid var(--border-inactive);
  }

  .section-title { font-size: 16px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--border-blue); line-height: 1.4; }
  .section-subtitle { font-size: 10px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.12em; text-transform: uppercase; }

  .btn {
    padding: 8px 14px; font-size: 10px; font-weight: 700; cursor: pointer;
    border: 2px solid var(--border-inactive); text-transform: uppercase; letter-spacing: 0.14em;
    transition: border-color 0.12s ease, background-color 0.12s ease, color 0.12s ease;
    background: var(--module); color: var(--text-bright);
  }

  .btn-signal { background: rgba(0,230,216,0.08); color: rgba(0,230,216,0.75); border-color: rgba(0,230,216,0.45); }
  .btn-signal:hover { background: rgba(0,230,216,0.16); color: var(--signal-green); border-color: var(--signal-green); }
  .btn-ghost { background: var(--module); color: var(--border-blue); border-color: var(--border-blue); }
  .btn-ghost:hover { background: rgba(46, 91, 255, 0.10); }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }

  .stat-module { background: var(--panel); border: 2px solid var(--border-inactive); padding: 18px 20px; }
  .stat-module:hover { border-color: var(--border-blue); }

  .stat-module-label {
    font-size: 8px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--border-blue); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }

  .stat-module-label::before { content: ''; width: 6px; height: 6px; border: 1px solid var(--border-blue); background: transparent; }
  .stat-module-label.active::before { background: var(--border-blue); border-color: var(--border-blue); }

  .stat-val { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; color: var(--text-bright); }
  .stat-val-lit { color: var(--text-mid); }
  .stat-sub { font-size: 9px; color: var(--text-ghost); margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }

  .filter-bar {
    display: flex; align-items: center; gap: 6px; margin-bottom: 20px;
    padding: 12px 16px; background: var(--panel); border: 2px solid var(--border-inactive); flex-wrap: wrap;
  }

  .filter-label { font-size: 9px; font-weight: 700; color: var(--border-blue); letter-spacing: 0.14em; text-transform: uppercase; margin-right: 8px; }

  .filter-key {
    padding: 5px 10px; font-size: 10px; font-weight: 600; cursor: pointer;
    border: 1px solid rgba(0,230,216,0.18); background: var(--module); color: rgba(0,230,216,0.55);
    transition: border-color 0.12s ease, background-color 0.12s ease, color 0.12s ease;
    user-select: none; letter-spacing: 0.06em; text-transform: uppercase;
  }

  .filter-key:hover { border-color: rgba(0,230,216,0.65); color: rgba(0,230,216,0.9); background: rgba(0,230,216,0.05); }
  .filter-key.active { background: rgba(0,230,216,0.08); color: var(--signal-green); border-color: var(--signal-green); }
  .filter-sep { width: 1px; height: 18px; background: var(--border-inactive); margin: 0 8px; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 14px; }

  .signal-card {
    background: var(--panel); border: 2px solid var(--border-inactive);
    transition: border-color 0.12s ease, background-color 0.12s ease, opacity 0.12s ease;
    position: relative;
  }

  .signal-card:hover { border-color: var(--border-blue); background: var(--panel-alt); z-index: 1; }
  .signal-card[data-origin="asia"] { border-color: var(--border-blue); }
  .signal-card.triage-selected { border-color: var(--signal-green) !important; }

  .card-header {
    padding: 10px 16px; background: var(--module); border-bottom: 1px solid var(--border-inactive);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  .card-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card-id { font-size: 9px; font-weight: 700; color: var(--border-blue); letter-spacing: 0.14em; text-transform: uppercase; }

  .card-stream, .card-type {
    font-size: 8px; font-weight: 700; letter-spacing: 0.14em; padding: 3px 7px;
    text-transform: uppercase; border: 1px solid var(--border-blue); color: var(--border-blue); background: var(--inset);
  }

  .stream-a, .stream-b, .stream-c { border-color: var(--border-blue); color: var(--border-blue); }

  .card-body { padding: 16px 18px; }

  .card-origin {
    font-size: 9px; color: var(--border-blue); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px; letter-spacing: 0.12em; text-transform: uppercase; flex-wrap: wrap;
  }

  .card-origin::before { content: ''; width: 6px; height: 6px; border: 1px solid var(--border-blue); background: transparent; }

  .card-title { font-size: 13px; font-weight: 700; line-height: 1.5; margin-bottom: 8px; color: var(--text-bright); letter-spacing: 0.10em; text-transform: uppercase; }
  .card-summary { font-size: 10px; font-weight: 700; color: var(--text-mid); letter-spacing: 0.04em; margin-bottom: 10px; }
  .card-desc { font-size: 11px; color: var(--text-mid); line-height: 1.75; margin-bottom: 14px; text-align: justify; text-justify: inter-word; }

  .roi-module { background: var(--module); border: 2px solid var(--border-blue-soft); padding: 0; margin-bottom: 14px; }

  .roi-header {
    padding: 6px 10px; background: rgba(110, 136, 201, 0.04); border-bottom: 1px solid var(--border-inactive);
    font-size: 8px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--border-blue); display: flex; align-items: center; gap: 8px;
  }

  .roi-led { width: 6px; height: 6px; background: var(--border-blue); }
  .roi-body { padding: 10px; }
  .roi-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(110,136,201,0.10); }
  .roi-row:last-child { border-bottom: none; }
  .roi-key { font-size: 9px; font-weight: 700; color: var(--text-ghost); letter-spacing: 0.12em; }
  .roi-val { font-size: 13px; font-weight: 800; color: var(--text-mid); letter-spacing: 0.04em; }
  .roi-text { font-size: 12px; font-weight: 700; color: var(--text-mid); letter-spacing: 0.08em; text-transform: uppercase; }

  .card-footer {
    padding: 12px 16px; border-top: 1px solid var(--border-inactive);
    display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--module);
  }

  .card-source { font-size: 9px; color: var(--border-blue); letter-spacing: 0.08em; text-transform: uppercase; }
  .action-btns { display: flex; gap: 6px; }

  .key-btn {
    padding: 6px 12px; font-size: 9px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.12em; text-transform: uppercase;
    transition: border-color 0.12s ease, background-color 0.12s ease, color 0.12s ease;
    border: 2px solid var(--border-inactive); background: var(--module);
  }

  .key-keep { background: rgba(0,230,216,0.08); color: rgba(0,230,216,0.7); border-color: rgba(0,230,216,0.4); }
  .key-keep:hover { background: rgba(0,230,216,0.18); color: var(--signal-green); border-color: var(--signal-green); }
  .key-zap { color: var(--border-blue); border-color: var(--border-blue); }
  .key-zap:hover { background: rgba(46, 91, 255, 0.10); }
  .key-keep:active { background: rgba(0,230,216,0.28); color: var(--signal-green); border-color: var(--signal-green); }
  .btn-signal:active { background: rgba(0,230,216,0.28); color: var(--signal-green); border-color: var(--signal-green); }
  .filter-key:active { background: rgba(0,230,216,0.20); color: var(--signal-green); border-color: var(--signal-green); }
  .nav-tab:active { color: var(--signal-green); border-bottom-color: var(--signal-green); }

  .map-container { background: var(--panel); border: 2px solid var(--border-inactive); margin-bottom: 24px; }

  .map-header {
    padding: 12px 16px; background: var(--module); border-bottom: 1px solid var(--border-inactive);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    font-size: 10px; color: var(--border-blue); letter-spacing: 0.10em; text-transform: uppercase;
  }

  .map-canvas {
    width: 100%; height: 400px;
    background: linear-gradient(rgba(110, 136, 201, 0.14) 1px, transparent 1px), linear-gradient(90deg, rgba(110, 136, 201, 0.14) 1px, transparent 1px), var(--panel-alt);
    background-size: 36px 36px, 36px 36px, auto;
    position: relative; border-bottom: 1px solid var(--border-inactive); overflow: hidden;
  }

  .map-base { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center; opacity: 0.94; }
  .map-overlay { position: absolute; inset: 0; width: 100%; height: 100%; }

  .map-coordinate { fill: var(--border-blue); font-size: 8px; font-family: var(--mono); font-weight: 700; letter-spacing: 0.08em; }
  .map-city { fill: var(--text-mid); font-size: 8px; font-family: var(--mono); font-weight: 600; letter-spacing: 0.08em; }
  .map-count { fill: var(--blue-highlight); font-size: 9px; font-family: var(--mono); font-weight: 700; letter-spacing: 0.1em; }

  .region-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }

  .region-module {
    background: var(--panel); border-right: 1px solid var(--border-inactive); padding: 18px 20px;
    cursor: pointer; transition: border-color 0.12s ease, background-color 0.12s ease; border-top: 2px solid transparent;
  }

  .region-module:last-child { border-right: none; }
  .region-module:hover { background: var(--module); border-top-color: var(--border-blue); }
  .region-module.active { background: var(--module); border-top-color: var(--signal-green); }

  .region-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--border-blue); margin-bottom: 6px; }
  .region-val { font-size: 28px; font-weight: 800; color: var(--text-bright); letter-spacing: -0.04em; }
  .region-module.active .region-val { color: var(--signal-green); }
  .region-sub { font-size: 9px; color: var(--text-ghost); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  .hub-grid { display: grid; grid-template-columns: 1fr 420px; gap: 14px; }

  .hub-list-panel, .detail-panel { background: var(--panel); border: 2px solid var(--border-inactive); }

  .hub-list-header, .detail-header, .copy-module-header {
    padding: 10px 16px; background: var(--module); border-bottom: 1px solid var(--border-inactive);
    font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--border-blue);
  }

  .hub-item { padding: 16px 18px; border-bottom: 1px solid var(--border-inactive); cursor: pointer; transition: border-color 0.12s ease, background-color 0.12s ease; }
  .hub-item:hover { background: var(--module); }
  .hub-item.selected { background: var(--module); border-left: 2px solid var(--signal-green); }

  .hub-item-id, .hub-item-source, .detail-header-label, .detail-origin, .detail-key { font-size: 9px; color: var(--border-blue); letter-spacing: 0.12em; text-transform: uppercase; }
  .hub-item-id { margin-bottom: 6px; }

  .hub-item-title, .detail-title { font-size: 12px; font-weight: 700; color: var(--text-bright); letter-spacing: 0.04em; line-height: 1.6; }
  .hub-item-summary { font-size: 10px; font-weight: 700; color: var(--text-mid); letter-spacing: 0.08em; text-transform: uppercase; margin: 8px 0 6px; }
  .hub-item-roi { font-size: 10px; color: var(--text-mid); margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }

  .detail-panel { position: sticky; top: 96px; }
  .detail-header { padding: 12px 16px; }
  .detail-header-label { margin-bottom: 8px; }
  .detail-origin { margin-top: 6px; }
  .detail-body { padding: 16px 18px; }

  .detail-row { display: flex; justify-content: space-between; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--border-inactive); }
  .detail-row:last-child { border-bottom: none; }

  .detail-val { font-size: 11px; font-weight: 600; color: var(--text-mid); text-align: right; letter-spacing: 0.02em; }
  .detail-val-signal { color: var(--text-mid); }

  .copy-module { background: var(--module); border: 2px solid var(--border-blue-soft); margin-top: 14px; }
  .copy-module-header { padding: 8px 10px; }
  .copy-module-body { padding: 12px 10px; }
  .copy-text { font-size: 11px; color: var(--text-mid); line-height: 1.75; text-align: justify; text-justify: inter-word; }
  .copy-actions { display: flex; gap: 6px; margin-top: 10px; }

  .pipeline-section { margin-bottom: 24px; }

  .pipeline-header-row {
    display: flex; align-items: center; gap: 18px; padding: 18px 20px;
    background: var(--panel); border: 2px solid var(--border-inactive); border-bottom: none;
  }

  .pipeline-pct { font-size: 36px; font-weight: 800; letter-spacing: -0.06em; color: var(--border-blue); min-width: 74px; }
  .pipeline-pct-lit { color: var(--border-blue); }
  .pipeline-info { flex: 1; }
  .pipeline-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.03em; color: var(--text-bright); }
  .pipeline-freq { font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }

  .pipeline-led, .src-status, .priority-led-box {
    font-size: 8px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 5px 10px; border: 2px solid var(--border-inactive);
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }

  .led-active, .src-live, .priority-led-box { background: var(--blue-highlight-soft); color: var(--border-blue); border-color: var(--border-blue); }
  .led-active::before, .src-live::before { content: ''; width: 6px; height: 6px; background: var(--border-blue); }
  .led-scheduled, .src-pending { background: rgba(46, 91, 255, 0.10); color: var(--border-blue); border-color: var(--border-blue); }
  .led-idle, .src-idle { background: var(--module); color: var(--text-ghost); border-color: var(--border-inactive); }

  .pipeline-bar { height: 10px; background: var(--module); border-left: 2px solid var(--border-inactive); border-right: 2px solid var(--border-inactive); }
  .pipeline-fill { height: 100%; transition: width 1s ease; }
  .fill-active { background: var(--border-blue); }
  .fill-dim { background: var(--border-blue); }

  .pipeline-sources { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0; border: 2px solid var(--border-inactive); border-top: none; }

  .src-card { background: var(--panel); padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; border-bottom: 1px solid var(--border-inactive); border-right: 1px solid var(--border-inactive); }

  .src-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; background: var(--module); border: 2px solid var(--border-blue); color: var(--border-blue); flex-shrink: 0; }
  .src-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.02em; color: var(--text-bright); }
  .src-desc { font-size: 10px; color: var(--text-mid); line-height: 1.7; text-align: justify; text-justify: inter-word; }
  .src-status { margin-left: auto; }

  .priority-alert { background: var(--module); border: 2px solid var(--border-inactive); padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-mid); text-align: justify; }
  .priority-alert strong { color: var(--border-blue); letter-spacing: 0.10em; }
  .priority-led-box { margin-left: auto; }

  .antifilters { background: var(--panel); border: 2px solid var(--border-inactive); margin-top: 8px; }
  .antifilters-header { padding: 10px 14px; background: var(--module); border-bottom: 1px solid var(--border-inactive); font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--border-blue); }
  .antifilters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0; padding: 0; }

  .af-item { padding: 10px 12px; font-size: 10px; font-weight: 600; border-bottom: 1px solid var(--border-inactive); border-right: 1px solid var(--border-inactive); display: flex; align-items: center; gap: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  .af-item::before { content: ''; width: 6px; height: 6px; flex-shrink: 0; border: 1px solid currentColor; background: transparent; }
  .af-reject { color: var(--border-blue); background: rgba(46, 91, 255, 0.06); }
  .af-require { color: var(--text-mid); background: rgba(110, 136, 201, 0.06); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); border: 2px dashed var(--border-inactive); background: var(--panel); }
  .empty-title { font-size: 12px; font-weight: 700; color: var(--border-blue); margin-bottom: 6px; letter-spacing: 0.10em; text-transform: uppercase; }
  .empty-desc { font-size: 10px; color: var(--text-ghost); letter-spacing: 0.02em; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel); border: 2px solid var(--border-blue); padding: 10px 16px; font-size: 11px; color: var(--text-bright); z-index: 999; transform: translateY(80px); opacity: 0; transition: transform 0.2s ease, opacity 0.2s ease; pointer-events: none; letter-spacing: 0.08em; text-transform: uppercase; }
  .toast.show { transform: translateY(0); opacity: 1; }

  .scrollable-list { max-height: 560px; overflow-y: auto; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--base); }
  ::-webkit-scrollbar-thumb { background: var(--border-blue); }

  @media (max-width: 1000px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .hub-grid { grid-template-columns: 1fr; }
    .region-strip { grid-template-columns: repeat(2, 1fr); }
    .detail-panel { position: static; }
  }

  @media (max-width: 700px) {
    nav { overflow-x: auto; padding: 0 16px; }
    main { padding: 18px 16px 32px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .cards-grid { grid-template-columns: 1fr; }
    header { padding: 12px 16px; align-items: flex-start; }
    .header-readout { display: none; }
    .section-header { flex-direction: column; align-items: flex-start; }
    .pipeline-header-row, .priority-alert { flex-direction: column; align-items: flex-start; }
    .priority-led-box, .src-status { margin-left: 0; }
  }

  
/* ── Social Extract ── */
.social-extract { border-top: 1px solid var(--border-inactive); margin-top: 16px; padding-top: 14px; }
.social-extract-header { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-ghost); margin-bottom: 10px; }
.social-format-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.fmt-tab { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border-inactive); background: transparent; color: var(--text-dim); cursor: pointer; }
.fmt-tab.active { border-color: var(--signal-green); color: var(--signal-green); background: var(--signal-green-soft); }
.social-caption-box { background: var(--inset); border-radius: 6px; padding: 12px; margin-bottom: 10px; }
.social-caption-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-ghost); margin-bottom: 6px; }
.social-caption-text { font-size: 12px; line-height: 1.6; color: var(--text-bright); white-space: pre-wrap; font-family: var(--mono); }
.social-meta { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.social-meta-item { font-size: 10px; color: var(--text-dim); background: var(--panel); border-radius: 4px; padding: 4px 8px; }
.social-copy-btn { width: 100%; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px; border-radius: 6px; border: 1px solid var(--signal-green); background: transparent; color: var(--signal-green); cursor: pointer; transition: background 0.15s; }
.social-copy-btn:hover { background: var(--signal-green-soft); }
.social-copy-btn.copied { background: var(--signal-green-soft); }

/* ── Financial Insights Calc ── */
.financial-calc { padding: 14px 0 4px; }
.fc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.fc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-ghost); display: flex; flex-direction: column; gap: 4px; }
.fc-input { background: var(--inset); border: 1px solid var(--border-inactive); border-radius: 4px; padding: 7px 10px; color: var(--text-bright); font-size: 12px; font-family: var(--mono); width: 100%; }
.fc-input:focus { outline: none; border-color: var(--signal-green); }
.fc-output { margin-top: 12px; font-size: 11px; line-height: 1.7; color: var(--text-mid); font-family: var(--mono); }
.fc-output .fc-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border-inactive); }
.fc-output .fc-row-val { color: var(--signal-green); font-weight: 700; }
.fc-output .fc-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-top: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
.fc-output .fc-tag-good { background: var(--signal-green-soft); color: var(--signal-green); }
.fc-output .fc-tag-caution { background: rgba(255,200,0,0.1); color: #ffc800; }

/* ── gap.html design system ── */
html, body { font-family: var(--sans); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,230,216,0.2); border-radius: 4px; }

.glass { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-card); }

/* topbar */
.topbar { display:flex; align-items:center; gap:14px; padding:10px 20px; position:sticky; top:10px; z-index:50; margin:10px 16px 0; }
.topbar-logo { font-weight:700; color:var(--accent); letter-spacing:3px; font-size:16px; white-space:nowrap; flex-shrink:0; display:flex; align-items:center; gap:10px; }
.topbar-logo img { height:40px !important; width:auto !important; max-height:40px !important; display:block !important; }

.topbar-controls { display:flex; gap:8px; align-items:center; margin-left:auto; }
.topbar-title { font-size:13px; font-weight:600; color:var(--text); font-family:var(--mono); letter-spacing:0.04em; opacity:0.85; white-space:nowrap; }

.btn-topbar { background:transparent; border:1px solid rgba(255,255,255,0.08); color:var(--muted); padding:7px 13px; border-radius:7px; font-size:12px; cursor:pointer; transition:border-color .2s,color .2s; font-family:var(--mono); letter-spacing:0.08em; }
.btn-topbar:hover { border-color:var(--accent); color:var(--accent); }

/* hero */
.hero { display:grid; grid-template-columns:270px 1fr 1fr; gap:16px; padding:18px; margin:14px 16px; border-radius:14px; align-items:start; }

.hero-left { display:flex; flex-direction:column; gap:12px; flex-shrink:0; }
.hero-media { width:270px; aspect-ratio:9/16; background:#071018; border-radius:12px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer; background-size:cover; background-position:center; flex-shrink:0; }
.hero-media iframe,
.hero-media img,
.hero-media video { width:100%; height:100%; border:0; object-fit:cover; display:block; background:#05070b; }
.hero-placeholder { color:var(--muted-dim); font-size:13px; position:absolute; pointer-events:none; font-family:var(--mono); }
.alpha-badge { position:absolute; bottom:10px; right:10px; background:var(--accent); color:#021014; font-size:11px; font-weight:700; padding:4px 12px; border-radius:12px; font-family:var(--mono); letter-spacing:.5px; }
.hero-meta h1 { font-size:16px; font-weight:600; color:var(--text); font-family:var(--sans); }
.hero-meta p { color:var(--muted); font-size:12px; margin-top:5px; line-height:1.5; font-family:var(--sans); }
.hero-col2 { display:flex; flex-direction:column; gap:8px; min-width:0; }
.hero-col3 { display:flex; flex-direction:column; gap:8px; min-width:0; }
.wb-card { padding:12px; border-radius:8px; background:rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.04); }
.wb-title { font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:6px; font-family:var(--mono); }
.wb-badge { background:var(--accent); color:#021014; padding:1px 7px; border-radius:10px; font-size:10px; font-weight:700; }
.wb-templates { display:flex; gap:6px; flex-wrap:wrap; }
.wb-templates button { background:rgba(0,230,216,0.07); border:1px solid rgba(0,230,216,0.18); color:var(--accent); padding:5px 11px; border-radius:6px; font-size:11px; cursor:pointer; transition:background .2s; font-family:var(--mono); letter-spacing:0.06em; }
.wb-templates button:hover { background:rgba(0,230,216,0.18); }
.thumb-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.thumb-mini { aspect-ratio:16/9; background:#0b1014; border-radius:4px; cursor:pointer; border:1px solid transparent; transition:border-color .2s; overflow:hidden; background-size:cover; background-position:center; }
.thumb-mini:hover { border-color:rgba(0,230,216,0.3); }
.thumb-mini.empty { display:flex; align-items:center; justify-content:center; color:var(--muted-dim); font-size:9px; text-transform:uppercase; letter-spacing:0.08em; }
.mono-log { font-family:var(--mono); font-size:11px; color:var(--accent); line-height:1.6; }

/* main layout */
.gap-main { display:flex; gap:16px; padding:0 16px; margin-top:14px; }
.gap-left-col { flex:1; min-width:0; }
.wb-section { margin-bottom:18px; }

/* chip filters */
.chip-filters { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.chip-btn-g { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); color:var(--muted); padding:5px 14px; border-radius:20px; font-size:12px; cursor:pointer; transition:all .2s; font-family:var(--mono); letter-spacing:0.06em; }
.chip-btn-g.active { background:var(--accent); color:#021014; border-color:var(--accent); font-weight:700; }
.chip-btn-g.region-selected:not(.active) { border-color:rgba(0,230,216,0.45); color:var(--text); background:rgba(0,230,216,0.05); }
.chip-btn-g:hover:not(.active) { border-color:rgba(0,230,216,0.25); color:var(--text); }

/* media cards (gap.html style) */
.media-feed { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.media-card-g { display:flex; flex-direction:column; padding:12px; border:1px solid rgba(255,255,255,0.04); border-radius:10px; background:var(--card); transition:border-color .2s,background .2s; cursor:pointer; }
.media-card-g:hover { background:rgba(14,17,20,0.9); border-color:rgba(0,230,216,0.15); }
.card-thumb-g { width:100%; aspect-ratio:16/9; border-radius:7px; overflow:hidden; background:#0b0e12; position:relative; margin-bottom:10px; }
.card-thumb-g img { width:100%; height:100%; object-fit:cover; display:block; }
.card-thumb-empty-g { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted-dim); font-size:10px; text-transform:uppercase; letter-spacing:0.1em; text-align:center; padding:12px; }
.thumb-overlay-g { position:absolute; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
.card-thumb-g:hover .thumb-overlay-g { opacity:1; }
.play-icon-g { color:white; font-size:22px; }
.card-title-g { font-weight:600; font-size:13px; line-height:1.4; margin-bottom:7px; color:var(--text); font-family:var(--sans); }
.card-chips-g { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:7px; }
.chip-g { background:rgba(255,255,255,0.04); padding:2px 8px; border-radius:10px; font-size:10px; color:var(--muted); font-family:var(--mono); }
.chip-g.alpha { background:var(--accent); color:#021014; font-weight:700; }
.chip-g.patent { background:rgba(124,58,237,0.25); color:#b89fff; }
.chip-g.asia { background:rgba(0,230,216,0.08); color:var(--accent); }
.chip-g.europe { background:rgba(255,110,199,0.08); color:#FF6EC7; }
.chip-g.americas { background:rgba(124,58,237,0.08); color:#b89fff; }
.chip-g.middle-east { background:rgba(255,200,50,0.08); color:#ffc832; }
.card-desc-g { color:var(--muted); font-size:11px; line-height:1.5; margin-bottom:8px; font-family:var(--sans); }
.card-actions-g { display:flex; gap:5px; }
.card-actions-g button { flex:1; padding:5px 0; border-radius:5px; border:0; background:#0b0e12; color:var(--muted); font-size:11px; cursor:pointer; transition:background .2s,color .2s; font-family:var(--mono); letter-spacing:0.06em; }
.card-actions-g button:hover { background:var(--accent); color:#021014; }

/* right workbench calc */
.wb-calc { display:flex; flex-direction:column; gap:8px; }
.wb-calc label { display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--muted); font-family:var(--mono); }
.wb-calc input { background:rgba(0,0,0,0.35); border:1px solid rgba(0,230,216,0.1); padding:7px 10px; border-radius:6px; color:var(--text); font-size:12px; font-family:var(--sans); outline:none; }
.wb-calc input:focus { border-color:rgba(0,230,216,0.3); }
.wb-calc-btn { background:var(--accent); border:none; color:#021014; padding:9px; border-radius:6px; font-weight:700; font-size:12px; cursor:pointer; transition:opacity .2s; font-family:var(--mono); letter-spacing:0.08em; }
.wb-calc-btn:hover { opacity:.85; }
.wb-calc-result { background:rgba(0,0,0,0.35); padding:10px; border-radius:6px; font-size:11px; line-height:1.8; margin-top:2px; min-height:40px; font-family:var(--mono); color:var(--accent); }

/* signal insight panel */
.signal-insight-wrap { display:flex; flex-direction:column; gap:8px; }
.insight-placeholder { font-size:11px; color:var(--muted); font-family:var(--mono); padding:10px; text-align:center; border:1px dashed rgba(0,230,216,0.15); border-radius:6px; }
.insight-row { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.insight-row:last-child { border-bottom:none; }
.insight-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; margin-top:1px; }
.insight-body { flex:1; min-width:0; }
.insight-label { font-size:10px; color:var(--muted); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px; }
.insight-val { font-size:12px; color:var(--text); line-height:1.5; }
.insight-thesis { color:rgba(0,230,216,0.85); font-style:italic; }
.insight-gauge-wrap { display:flex; flex-direction:column; gap:4px; }
.insight-gauge-track { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
.insight-gauge-fill { height:100%; background:linear-gradient(90deg,#00e6d8,#ff6b6b); border-radius:3px; transition:width .5s ease; }
.insight-diff-num { font-size:11px; color:var(--text); font-family:var(--mono); }
/* region highlight on signal cards */
.signal-card.region-highlight,
.media-card-g.region-highlight { border-color: var(--accent); background: rgba(0,230,216,0.05); }
.signal-card.region-dim,
.media-card-g.region-dim { opacity:0.35; }
/* region zone active glow override */
.region-zone.zone-active .zone-fill { animation:zone-active-pulse 1.8s ease-in-out infinite; filter:drop-shadow(0 0 12px rgba(0,230,216,0.9)); }
.region-zone.zone-active .zone-border { stroke:var(--accent); stroke-width:3; opacity:1; }
.wb-console { max-height:100px; overflow-y:auto; background:#05080a; padding:10px; border-radius:6px; font-size:11px; line-height:1.6; font-family:var(--mono); color:var(--accent); }

/* queue */
.wb-queue { max-height:140px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
.queue-row-g { padding:7px 10px; background:rgba(255,255,255,0.02); border-radius:6px; font-size:11px; cursor:pointer; border:1px solid transparent; transition:border-color .2s; font-family:var(--mono); color:var(--muted); }
.queue-row-g:hover { border-color:rgba(0,230,216,0.15); color:var(--text); }
.queue-empty-g { color:var(--muted-dim); font-size:11px; padding:8px 0; font-family:var(--mono); }

/* map floating pane */
.map-float { position:fixed; right:20px; bottom:80px; width:260px; padding:8px; overflow:hidden; z-index:30; transition:height 0.3s ease; height:165px; }
  .map-float.collapsed { height:28px; }
  .map-float-header { font-size:10px; color:var(--muted); margin-bottom:3px; text-transform:uppercase; letter-spacing:1px; font-family:var(--mono); cursor:pointer; display:flex; align-items:center; justify-content:space-between; user-select:none; }
  .map-float-header:hover { color:var(--accent); }



/* pulse for map markers */
/* region zone base */
@keyframes zone-breathe {
  0%,100% { opacity:.18; }
  50%      { opacity:.32; }
}
@keyframes zone-active-pulse {
  0%,100% { opacity:.72; }
  50%      { opacity:1; }
}
.zone-fill {
  fill: var(--accent);
  opacity: 0;
  animation: none;
}
.zone-border {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.5;
  opacity: 0;
  animation: none;
}
.region-zone.zone-active .zone-fill {
  fill: var(--accent);
  opacity: .72;
  animation: zone-active-pulse 1.8s ease-in-out infinite;
}
.region-zone.zone-active .zone-border {
  stroke: var(--accent);
  stroke-width: 2.5;
  opacity: 1;
  animation: zone-active-pulse 1.8s ease-in-out infinite;
}
.region-zone.zone-dim .zone-fill  { opacity: .07; animation: none; }
.region-zone.zone-dim .zone-border { opacity: .14; animation: none; }

/* modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:80; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
.modal-bg.open { opacity:1; pointer-events:auto; }
.modal-box { background:#0d1117; border:1px solid rgba(0,230,216,0.15); border-radius:14px; padding:24px; width:420px; max-width:94vw; }
.modal-box h2 { font-size:16px; margin-bottom:14px; color:var(--accent); font-family:var(--sans); }
.modal-box p { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:8px; font-family:var(--sans); }
.modal-close-btn { margin-top:16px; background:var(--accent); border:none; color:#021014; padding:8px 20px; border-radius:7px; font-weight:600; cursor:pointer; font-family:var(--mono); }

/* stat modules for existing triage stats */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(255,255,255,0.04); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.stat-module { background:var(--card); padding:14px 16px; }
.stat-module-label { font-size:9px; text-transform:uppercase; letter-spacing:0.14em; color:var(--muted); margin-bottom:6px; font-family:var(--mono); }
.stat-val { font-size:28px; font-weight:800; color:var(--accent); letter-spacing:-0.04em; line-height:1; font-family:var(--mono); }
.stat-sub { font-size:9px; color:var(--muted-dim); margin-top:4px; letter-spacing:0.08em; text-transform:uppercase; font-family:var(--mono); }

/* empty state */
.empty-g { color:var(--muted-dim); font-size:13px; padding:40px 0; text-align:center; grid-column:1/-1; font-family:var(--mono); }

/* ingest log */
#ingestLog { max-height:52px; overflow:hidden; }

body { padding-bottom: 0; }

</style>

function normalizeStream(value) {
  const v = String(value || '').trim().toLowerCase();
  if (['tech', 'a', 'hardware', 'technology'].includes(v)) return 'tech';
  if (['business', 'biz', 'b', 'ideas', 'idea', 'model', 'models'].includes(v)) return 'biz';
  return 'rd';
}

function normalizeOrigin(value) {
  const v = String(value || '').trim().toLowerCase();
  if (!v) return 'asia';
  if (v.includes('middle') || v === 'me' || v.includes('uae') || v.includes('saudi') || v.includes('gulf')) return 'me';
  if (v.includes('asia') || v.includes('japan') || v.includes('singapore') || v.includes('turkey')) return 'asia';
  if (v.includes('europe') || v.includes('france') || v.includes('switzerland') || v.includes('germany')) return 'europe';
  if (v.includes('america') || v.includes('usa') || v.includes('united states') || v.includes('canada')) return 'americas';
  return v.replace(/[^a-z]/g, '') || 'asia';
}

function regionFilterKey(value) {
  const origin = normalizeOrigin(value);
  return origin === 'me' ? 'middle_east' : origin;
}

function normalizeSourceType(value) {
  const v = String(value || '').trim().toLowerCase();
  if (v.includes('patent')) return 'PATENT';
  if (v.includes('trade') || v.includes('expo') || v.includes('show') || v.includes('conference')) return 'TRADE_SHOW';
  if (v.includes('kickstarter') || v.includes('crowd') || v.includes('indiegogo')) return 'CROWDFUNDED';
  if (v.includes('news') || v.includes('press') || v.includes('rss')) return 'NEWS_SIGNAL';
  if (v.includes('concept') || v.includes('r&d') || v.includes('research')) return 'R&D_CONCEPT';
  return formatCode(value || 'SOURCE');
}

function sourceTypeLabel(value) {
  return normalizeSourceType(value).replace(/_/g, ' ');
}

function prettyOriginLabel(origin, raw) {
  if (raw && String(raw).trim()) return String(raw).trim();
  const map = {
    asia: 'Asia',
    europe: 'Europe',
    me: 'Middle East',
    americas: 'Americas'
  };
  return map[normalizeOrigin(origin)] || 'Global';
}

function formatIncomingDate(value, fallbackId) {
  if (!value) return signalDates[fallbackId] || '16.04.26';
  const raw = String(value).trim();
  if (/^\d{2}\.\d{2}\.\d{2}$/.test(raw)) return raw;
  const parsed = new Date(raw);
  if (Number.isNaN(parsed.getTime())) return raw.slice(0, 8);
  const dd = String(parsed.getUTCDate()).padStart(2, '0');
  const mm = String(parsed.getUTCMonth() + 1).padStart(2, '0');
  const yy = String(parsed.getUTCFullYear()).slice(-2);
  return dd + '.' + mm + '.' + yy;
}

function looksLikeYouTube(url) {
  return /youtube\.com|youtu\.be/.test(String(url || ''));
}

function toYouTubeEmbed(url) {
  const raw = String(url || '');
  if (!raw) return '';
  if (raw.includes('/embed/')) return raw;
  const watchMatch = raw.match(/[?&]v=([^&]+)/);
  if (watchMatch) return 'https://www.youtube.com/embed/' + watchMatch[1];
  const shortMatch = raw.match(/youtu\.be\/([^?&/]+)/);
  if (shortMatch) return 'https://www.youtube.com/embed/' + shortMatch[1];
  return raw;
}

function toYouTubeWatch(url) {
  const embed = toYouTubeEmbed(url);
  const match = embed.match(/\/embed\/([^?&/]+)/);
  return match ? 'https://www.youtube.com/watch?v=' + match[1] : String(url || '');
}

function escapeHtml(text) {
  return String(text || '').replace(/[&<>"']/g, function(ch) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
  });
}

function estimateMetrics(stream, sourceType) {
  const s = normalizeStream(stream);
  const t = normalizeSourceType(sourceType);
  if (s === 'tech') {
    return t === 'PATENT'
      ? { setupCost: 28000, unitPrice: 11, dailyVolume: 85 }
      : { setupCost: 22000, unitPrice: 10, dailyVolume: 70 };
  }
  if (s === 'biz') {
    return t === 'CROWDFUNDED'
      ? { setupCost: 9000, unitPrice: 24, dailyVolume: 22 }
      : { setupCost: 12000, unitPrice: 18, dailyVolume: 28 };
  }
  return { setupCost: 16000, unitPrice: 8, dailyVolume: 45 };
}

function normalizeSignal(raw, index) {
  const sourceUrl = raw.url || raw.sourceUrl || raw.link || raw.pageUrl || '';
  const stream = normalizeStream(raw.stream || raw.category);
  const sourceType = normalizeSourceType(raw.sourceType || raw.category || raw.source);
  const origin = normalizeOrigin(raw.origin || raw.region || raw.country || raw.originLabel);
  const fallbackMetrics = estimateMetrics(stream, sourceType);
  const mediaUrl = raw.mediaUrl || raw.videoUrl || raw.image || raw.imageUrl || raw.thumbnail || raw.thumbUrl || '';
  const thumbUrl = raw.thumbUrl || raw.thumbnail || raw.image || raw.imageUrl || '';
  const mediaType = String(raw.mediaType || '').toLowerCase() || (looksLikeYouTube(mediaUrl) ? 'video' : /\.(mp4|mov|webm)(\?|$)/i.test(mediaUrl) ? 'video' : 'image');
  return {
    id: Number(raw.id) || index + 1,
    stream,
    origin,
    originLabel: prettyOriginLabel(origin, raw.originLabel || raw.region || raw.country),
    title: raw.title || raw.name || 'Untitled Signal',
    desc: raw.desc || raw.description || raw.snippet || '',
    source: raw.source || sourceTypeLabel(sourceType),
    sourceType,
    setupCost: Number(raw.setupCost) || fallbackMetrics.setupCost,
    unitPrice: Number(raw.unitPrice) || fallbackMetrics.unitPrice,
    dailyVolume: Number(raw.dailyVolume) || fallbackMetrics.dailyVolume,
    tradeShow: raw.tradeShow || raw.event || '',
    date: formatIncomingDate(raw.date || raw.pubDate || raw.priority_date || raw.publication_date, Number(raw.id) || index + 1),
    mediaType,
    mediaUrl: mediaUrl,
    thumbUrl: thumbUrl && thumbUrl.includes('undefined') ? '' : thumbUrl,
    mediaOrigin: raw.mediaOrigin || formatCode(origin),
    url: sourceUrl || ''
  };
}

function scoreSignalPriority(signal) {
  const regionScore = { asia: 40, europe: 35, me: 30, americas: 10 };
  const sourceScore = { PATENT: 12, TRADE_SHOW: 10, CROWDFUNDED: 8, NEWS_SIGNAL: 6, 'R&D_CONCEPT': 7 };
  const freshness = /^\d{2}\.\d{2}\.\d{2}$/.test(signal.date || '') ? Number((signal.date || '').slice(0, 2)) : 0;
  return (regionScore[normalizeOrigin(signal.origin)] || 5) + (sourceScore[normalizeSourceType(signal.sourceType)] || 0) + freshness;
}

function normalizeIncomingFeed(payload) {
  const rawSignals = Array.isArray(payload)
    ? payload
    : Array.isArray(payload && payload.signals)
      ? payload.signals
      : Array.isArray(payload && payload.array)
        ? payload.array
        : Array.isArray(payload && payload.data)
          ? payload.data
          : [];
  const normalizedSignals = rawSignals
    .map(function(item, index) { return normalizeSignal(item || {}, index); })
    .sort(function(a, b) { return scoreSignalPriority(b) - scoreSignalPriority(a); });
  return {
    meta: payload && payload.meta ? payload.meta : { last_updated: new Date().toLocaleString() },
    signals: normalizedSignals
  };
}

function copyToClipboardSafe(text, onDone) {

}

function openSignalSource(id) {

function downloadOrOpenMedia(signal, label) {
  const titleSlug = (signal.title || 'gap-signal').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  const platformSlug = String(label || 'export').toLowerCase();
  const exportAsset = resolveExportAsset(signal, titleSlug, platformSlug);
  if (!exportAsset || !exportAsset.url) {
    showToast('No media available');
    return;
  }
  showToast('Preparing download…');
  fetch(exportAsset.url, { mode: 'cors', cache: 'no-store' })
    .then(function(response) {
      if (!response.ok) throw new Error('download failed');
      return response.blob();
    })
    .then(function(blob) {
      const objectUrl = URL.createObjectURL(blob);
      triggerFileDownload(objectUrl, exportAsset.filename);
      setTimeout(function() { URL.revokeObjectURL(objectUrl); }, 2000);
      showToast(exportAsset.toastLabel + ' downloaded');
    })
    .catch(function() {
      if (exportAsset.fallbackUrl && exportAsset.fallbackUrl !== exportAsset.url) {
        fetch(exportAsset.fallbackUrl, { mode: 'cors', cache: 'no-store' })
          .then(function(response) {
            if (!response.ok) throw new Error('fallback failed');
            return response.blob();
          })
          .then(function(blob) {
            const objectUrl = URL.createObjectURL(blob);
            triggerFileDownload(objectUrl, exportAsset.filename);
            setTimeout(function() { URL.revokeObjectURL(objectUrl); }, 2000);
            showToast(exportAsset.toastLabel + ' downloaded');
          })
          .catch(function() {
            showToast('Download blocked for this source');
          });
        return;
      }
      showToast('Download blocked for this source');
    });
}

function resolveExportAsset(signal, titleSlug, platformSlug) {
  const mediaUrl = signal.mediaUrl || '';
  const thumbUrl = signal.thumbUrl || '';
  const directVideo = isDirectSourceVideo(mediaUrl);
  const directImage = isDirectSourceImage(mediaUrl);

  if (directVideo) {
    return {
      url: mediaUrl,
      filename: titleSlug + '-' + platformSlug + guessFileExtension(mediaUrl, '.mp4'),
      toastLabel: 'Video'
    };
  }
  if (directImage) {
    return {
      url: mediaUrl,
      filename: titleSlug + '-' + platformSlug + guessFileExtension(mediaUrl, '.jpg'),
      toastLabel: 'Image'
    };
  }
  if (isDirectSourceImage(thumbUrl)) {
    return {
      url: thumbUrl,
      filename: titleSlug + '-' + platformSlug + guessFileExtension(thumbUrl, '.jpg'),
      toastLabel: 'Image'
    };
  }
  // Fallback: if YouTube embed, try to download the YouTube thumbnail
  if (isYouTubeHostedUrl(thumbUrl) && thumbUrl) {
    return {
      url: thumbUrl,
      filename: (titleSlug || 'signal') + '-' + (platformSlug || 'export') + '.jpg',
      toastLabel: 'Thumbnail'
    };
  }
  return null;
}

function normalizeYouTubeThumbUrl(url) {
  const raw = String(url || '');
  const embed = toYouTubeEmbed(raw);
  const match = embed.match(/\/embed\/([^?&/]+)/);
  if (!match) return raw;
  return 'https://i.ytimg.com/vi/' + match[1] + '/hqdefault.jpg';
}

function isYouTubeHostedUrl(url) {
  return /(?:youtube\.com|youtu\.be|ytimg\.com|img\.youtube\.com)/i.test(String(url || ''));
}

function isGenericThumbUrl(url) {
  const raw = String(url || '');
  return /images\.unsplash\.com/i.test(raw) || Object.values(THUMB_MAP).includes(raw);
}

function isDirectSourceVideo(url) {
  const raw = String(url || '');
  return !!raw && !isYouTubeHostedUrl(raw) && /\.(mp4|mov|webm|m4v)(\?|$)/i.test(raw);
}

function isDirectSourceImage(url) {
  const raw = String(url || '');
  return !!raw && !isYouTubeHostedUrl(raw) && !isGenericThumbUrl(raw) && /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(raw);
}

function guessFileExtension(url, fallback) {
  const clean = String(url || '').split('?')[0];
  const match = clean.match(/(\.[a-z0-9]{3,5})$/i);
  return match ? match[1].toLowerCase() : fallback;
}

function triggerFileDownload(href, filename) {
  const link = document.createElement('a');
  link.href = href;
  link.download = filename;
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
}

function loadUiState() { try { return { ...defaultUiState, ...JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}') }; } catch(e) { return { ...defaultUiState }; } }
function saveUiState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(uiState)); } catch(e) {} }
function normalizeView(v) { return allowedViews.has(v) ? v : defaultUiState.activeView; }
function normalizeFilter(f) { return allowedFilters.has(f) ? f : defaultUiState.triageFilter; }
function normalizeRegion(r) { return allowedRegions.has(r) ? r : defaultUiState.mapRegion; }
function normalizeHubSignalId(id) { return keptSignals.some(s => s.id === id) ? id : null; }
function monthlyRevEst(s) { return Math.round((Number(s.unitPrice) || 0) * (Number(s.dailyVolume) || 0) * 30); }
function marketGrowth(s) {
  const stream = normalizeStream(s.stream);
  if (stream === 'tech') return '18% CAGR';
  if (stream === 'biz') return '12% CAGR';
  return '22% CAGR';
}
function parseGrowthPercent(value) {
  const match = String(value || '').match(/(\d+(?:\.\d+)?)/);
  return match ? Number(match[1]) : 0;
}
function clampScore(value, min, max) {
  return Math.max(min, Math.min(max, Math.round(value)));
}
function getGapMetrics(s) {
  const stream = normalizeStream(s.stream);
  const sourceType = normalizeSourceType(s.sourceType);
  const monthly = monthlyRevEst(s);
  const setup = Number(s.setupCost) || 0;
  const growthPct = parseGrowthPercent(marketGrowth(s));
  const roiRatio = setup > 0 ? monthly / setup : 0;
  const paybackMonths = monthly > 0 ? setup / monthly : 99;

  let easeOfEntry = stream === 'tech' ? 72 : stream === 'biz' ? 84 : 76;
  if (setup <= 10000) easeOfEntry += 10;
  else if (setup <= 20000) easeOfEntry += 6;
  else if (setup <= 30000) easeOfEntry += 1;
  else easeOfEntry -= 6;
  if (sourceType === 'CROWDFUNDED') easeOfEntry += 6;
  if (sourceType === 'TRADE_SHOW') easeOfEntry += 3;
  if (sourceType === 'PATENT') easeOfEntry -= 5;
  if (roiRatio >= 0.8) easeOfEntry += 4;
  else if (roiRatio >= 0.4) easeOfEntry += 2;

  let longevity = sourceType === 'PATENT' ? 94
    : sourceType === 'TRADE_SHOW' ? 84
    : sourceType === 'CROWDFUNDED' ? 76
    : sourceType === 'NEWS_SIGNAL' ? 72
    : 80;
  longevity += Math.round((growthPct - 10) / 2);
  if (stream === 'tech') longevity += 2;
  if (stream === 'rd') longevity += 3;

  let viability = paybackMonths <= 3 ? 96
    : paybackMonths <= 6 ? 90
    : paybackMonths <= 12 ? 82
    : paybackMonths <= 18 ? 74
    : 66;
  if (monthly >= 20000) viability += 4;
  else if (monthly >= 10000) viability += 2;
  else if (monthly < 5000) viability -= 4;
  if (sourceType === 'CROWDFUNDED') viability += 4;
  if (sourceType === 'TRADE_SHOW') viability += 2;
  if (sourceType === 'PATENT') viability += 1;

  easeOfEntry = clampScore(easeOfEntry, 55, 96);
  longevity = clampScore(longevity, 60, 99);
  viability = clampScore(viability, 58, 98);

  return {
    easeOfEntry,
    longevity,
    viability,
    gapScore: clampScore((easeOfEntry + longevity + viability) / 3, 60, 99)
  };
}
function gapThesis(s) {
  const region = s.originLabel || prettyOriginLabel(s.origin, s.originLabel);
  const title = String(s.title || 'This GAP item').replace(/^(WIPO Patent|WIPO|Patent|Kickstarter|Indiegogo|LEAP|Behance|Dribbble|NAMA|RetailTech)\s*[:|-]\s*/i, '').trim();
  const stream = streamLabel(s.stream).toLowerCase();
  const sourceType = normalizeSourceType(s.sourceType);
  const benefit = benefitTags(s)[0] || 'scalable execution';
  let closer = 'It looks built for low-friction rollout and early-mover positioning.';
  if (sourceType === 'PATENT') closer = 'Its patent-backed angle gives it a more defensible path if adapted well for local demand.';
  if (sourceType === 'CROWDFUNDED') closer = 'Its early traction suggests clearer demand validation than a typical new concept.';
  if (sourceType === 'TRADE_SHOW') closer = 'Its trade-show profile suggests market-ready positioning rather than a purely speculative concept.';
  return 'A ' + stream + ' signal from ' + region + ' centered on ' + title + '. ' + closer;
}
function benefitTags(s) {
  const tags = [];
  const sourceType = normalizeSourceType(s.sourceType);
  const stream = normalizeStream(s.stream);
  if (sourceType === 'PATENT') tags.push('IP-Protected');
  if (sourceType === 'TRADE_SHOW') tags.push('Market-Validated');
  if (sourceType === 'CROWDFUNDED') tags.push('Demand-Proven');
  if (stream === 'tech') tags.push('Automation Play');
  if (stream === 'biz') tags.push('Scalable Model');
  tags.push('Low Overhead');
  return tags.slice(0, 3);
}
function streamClass(s) {
  const stream = normalizeStream(s && s.stream ? s.stream : s);
  if (stream === 'tech') return 'stream-a';
  if (stream === 'biz') return 'stream-b';
  return 'stream-c';
}
function streamLabel(s) { return normalizeStream(s)==='tech'?'Tech':normalizeStream(s)==='biz'?'Business':'Concepts'; }
function streamBreakdown(s) { return normalizeStream(s.stream)==='tech'?'Tech & Hardware':normalizeStream(s.stream)==='biz'?'Business Models':'R&D & Concepts'; }
function signalDate(s) { return s.date || signalDates[s.id] || '16.04.26'; }
function srcId(s) { return `GAP_${String(s.id).padStart(3,'0')}`; }
function regionNode(s) { return nodeLookup[s.originLabel]||formatCode(s.originLabel); }
function coordinates(s) { return coordinateLookup[s.originLabel]||'000.0000E // 00.0000N'; }
function formatCode(t) { return String(t).replace(/&/g,'AND').replace(/[^A-Za-z0-9]+/g,'_').replace(/^_+|_+$/g,'').toUpperCase(); }
function signalHeader(s) { return `${srcId(s)} // ${regionNode(s)} // ${signalDate(s)}`; }
function originReadout(s) { return `[${coordinates(s)}] // ${regionNode(s)} // ${formatCode(s.tradeShow||s.sourceType)}`; }

function sigId(s) { return `GAP_SIG_${String(s.id).padStart(3,'0')}`; }
function marketBlock(s) {

    shorts:  'Avg setup: $' + s.setupCost.toLocaleString() + '. Market growing at ' + growth + '.'
  };
  const hook = hooks[fmt] || hooks.tiktok;

function wireSocialExtract(s) {
  const tabs = document.querySelectorAll('.fmt-tab');
  let activeFmt = 'tiktok';
  renderSocialExtract(s, activeFmt);
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      activeFmt = tab.dataset.fmt;
      renderSocialExtract(s, activeFmt);
    });
  });
  const copyBtn = document.getElementById('social-copy-btn');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      const { hook, caption } = socialCaption(s, activeFmt);
      const fullText = hook + '\n\n' + caption;
      navigator.clipboard.writeText(fullText).then(function() {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.textContent = 'Copy Caption'; copyBtn.classList.remove('copied'); }, 2000);
      }).catch(function() {
        copyBtn.textContent = 'Copy failed';
        setTimeout(function() { copyBtn.textContent = 'Copy Caption'; }, 2000);
      });
    });
  }
}

// Unified filter – works with an explicit filter argument OR with the global _gapFilter
function getFilteredSignals(filter) {
  // If no argument was passed, fall back to the UI’s current filter
  const gf = filter || window._gapFilter || 'all';
  // Load persisted favorites (if any)
  if (typeof favorites === 'undefined') {
    // safety fallback – will be defined later when UI loads
    favorites = [];
  }

  // Start with all non‑removed signals
  let results = signals.filter(s => !s._removed);

  if (gf !== 'all') {
    // ---------- FAVORITES ----------
    if (gf === 'favorites') {
      results = results.filter(s => favorites.includes(s.id));
    }
    // ---------- REGION FILTER ----------
    else {
      const regionFilters = ['asia','europe','middle_east','americas'];
      if (regionFilters.includes(gf)) {
        results = results.filter(function(s) {
          const origin = normalizeOrigin(s.origin);
          return gf === 'middle_east' ? origin === 'me' : origin === gf;
        });
      }
      // ---------- STREAM FILTER ----------
      else {
        const streamMap = { tech: 'tech', business: 'biz', concepts: 'rd' };
        const wanted = streamMap[gf] || gf;
        results = results.filter(function(s) {
          return normalizeStream(s.stream) === wanted ||
                 String(s.type || '').toLowerCase() === wanted;
        });
      }
    }
  }
  return results;
}

function doFinancialCalc() {
  const cost = Number(document.getElementById('fc-cost').value) || 50000;
  const growth = Number(document.getElementById('fc-growth').value) || 25;
  const revenue = Number(document.getElementById('fc-revenue').value) || 8000;
  const tam = Number(document.getElementById('fc-tam').value) || 500000000;
  const out = document.getElementById('fc-out');
  if(!out) return;
  const annualRev = revenue * 12;
  const yr3Rev = Math.round(annualRev * Math.pow(1 + growth/100, 3));
  const yr5Rev = Math.round(annualRev * Math.pow(1 + growth/100, 5));
  const tamPct = ((annualRev / tam) * 100).toFixed(4);
  const paybackMonths = Math.ceil(cost / revenue);
  const grade = paybackMonths <= 12 ? 'Strong Signal' : paybackMonths <= 24 ? 'Moderate' : 'Long Horizon';
  const gradeClass = paybackMonths <= 12 ? 'fc-tag-good' : 'fc-tag-caution';
  out.innerHTML =
    '<div class="fc-row"><span>Est. Annual Revenue</span><span class="fc-row-val">$' + annualRev.toLocaleString() + '</span></div>' +
    '<div class="fc-row"><span>Year 3 Projection</span><span class="fc-row-val">$' + yr3Rev.toLocaleString() + '</span></div>' +
    '<div class="fc-row"><span>Year 5 Projection</span><span class="fc-row-val">$' + yr5Rev.toLocaleString() + '</span></div>' +
    '<div class="fc-row"><span>TAM Capture (Yr 1)</span><span class="fc-row-val">' + tamPct + '%</span></div>' +
    '<div class="fc-row"><span>Capital Recovery</span><span class="fc-row-val">~' + paybackMonths + ' months</span></div>' +
    '<br><span class="fc-tag ' + gradeClass + '">' + grade + '</span>';
}

function getThumb(s) {
  if (isDirectSourceImage(s.thumbUrl)) return s.thumbUrl;
  if (isDirectSourceImage(s.mediaUrl)) return s.mediaUrl;
  if (s.thumbUrl && isYouTubeHostedUrl(s.thumbUrl)) return s.thumbUrl;
  if (s.mediaUrl && looksLikeYouTube(s.mediaUrl)) {
    var embedUrl = toYouTubeEmbed(s.mediaUrl);
    var parts = embedUrl ? embedUrl.split('/') : [];
    var ytId = parts.length ? parts[parts.length - 1].split('?')[0] : '';
    if (ytId) return 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
  }
  return '';
}

    const originClass = normalizeOrigin(s.origin).replace(/[^a-z]/g, '-').replace(/^me$/, 'middle-east');
    const isPatent = normalizeSourceType(s.sourceType) === 'PATENT' || (s.source || '').toLowerCase().includes('patent');
    return `<article class="media-card-g" data-origin="${normalizeOrigin(s.origin)}" onclick="selectSignal(${s.id})">
      <div class="card-thumb-g">
        ${thumb ? `<img src="${thumb}" alt="${s.title}" loading="lazy" onerror="this.remove();"/>` : '<div class="card-thumb-empty-g">No source media</div>'}
        <div class="thumb-overlay-g"><span class="play-icon-g">▶</span></div>
      </div>
      <div class="card-title-g">${s.title}</div>
      <div class="card-chips-g">
        <span class="chip-g ${originClass}">${prettyOriginLabel(s.origin, s.originLabel)}</span>
        <span class="chip-g">${streamLabel(s.stream)}</span>
<span class="chip-g alpha">${gapScore}</span>
        ${isPatent ? '<span class="chip-g patent">Patent</span>' : ''}
      </div>
      <div class="card-desc-g">${(s.desc || '').slice(0,100)}${s.desc && s.desc.length > 100 ? '…' : ''}</div>
      <div class="card-actions-g">
        <button onclick="event.stopPropagation();keepCard(${s.id})">Save</button>
        <button onclick="event.stopPropagation();addToGapQueue(${s.id})">Queue</button>
        <button onclick="event.stopPropagation();openModal(${s.id})">Analyze</button>
      </div>
    </article>`;
  }).join('');
  if (window._activeRegion) {
    applyRegionFocus(window._activeRegion, { syncBubble: true });
  }
}

// Select a signal → update hero
function selectSignal(id) {
  const s = signals.find(x => x.id === id);
  if (!s) return;
  activeSignalId = id;
  const gapScore = getGapMetrics(s).gapScore;

  const _ht = document.getElementById('heroTitle');
  const _hi = document.getElementById('heroInsight');
  if (_ht) _ht.textContent = s.title;
  if (_hi) _hi.textContent = (s.desc || '') + ' · ' + (s.originLabel || s.origin || '') + ' · GAP Score ' + gapScore;
  renderHeroMedia(s);
  const badge = document.getElementById('heroBadge');
  if (badge) {
    badge.textContent = 'GAP Score ' + gapScore;
    badge.style.display = 'block';
  }
  gapLog('Loaded: ' + s.title);
  wireHeroSocialExtract(s);
  renderSignalInsight(s);
  applyRegionFocus(regionFilterKey(s.origin), { syncBubble: true });
  if (typeof showDetail === 'function') showDetail(s.id);
}

// Gap queue
function addToGapQueue(id) {
  const s = signals.find(x => x.id === id);
  if (!s || gapQueue.includes(id)) return;
  gapQueue.push(id);
  renderGapQueue();
  gapLog('Queued: ' + s.title);
}
function renderGapQueue() {
  const el = document.getElementById('queueList');
  const cnt = document.getElementById('queueCount');
  if (!el) return;
  if (!gapQueue.length) {
    el.innerHTML = '<div class="queue-empty-g">No items in queue</div>';
    if (cnt) cnt.style.display = 'none';
    return;
  }
  if (cnt) { cnt.textContent = gapQueue.length; cnt.style.display = 'inline'; }
  el.innerHTML = gapQueue.map((id, i) => {
    const s = signals.find(x => x.id === id);
    return `<div class="queue-row-g" onclick="selectSignal(${id})">${i+1}. ${s ? s.title.slice(0,34) : id}<span style="color:var(--accent);font-size:10px;margin-left:6px">α${getGapScore(s||{id:0,stream:'tech'})}
</span></div>`;
  }).join('');
}

// Recent saves thumbnail grid
function renderGapSaves() {
  const grid = document.getElementById('recentSaves');
  if (!grid) return;
  const saved = signals.filter(s => s._saved).slice(-8);
  document.getElementById('saveCount').textContent = signals.filter(s=>s._saved).length;
  if (!saved.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = saved.map(s => {
    const thumb = getThumb(s);
    return thumb
      ? `<div class="thumb-mini" style="background-image:url(${thumb})" onclick="selectSignal(${s.id})" title="${s.title}"></div>`
      : `<div class="thumb-mini empty" onclick="selectSignal(${s.id})" title="${s.title}">No Media</div>`;
  }).join('');
}

// Financial calc for workbench
function renderSignalInsight(s) {
  const panel = document.getElementById('signal-insight-panel');
  if (!panel) return;
  const metrics = getGapMetrics(s);
  const monthly = Math.round(s.unitPrice * s.dailyVolume * 30);
  const avgEarnings = '$' + monthly.toLocaleString() + '/mo avg.';
  const costLow = Math.round(s.setupCost * 0.8);
  const costHigh = Math.round(s.setupCost * 1.4);
  const costStr = '$' + (costLow >= 1000 ? (costLow/1000).toFixed(0) + 'k' : costLow) + '-$' + (costHigh >= 1000 ? (costHigh/1000).toFixed(0) + 'k' : costHigh);
  const growth = marketGrowth(s);
  const thesis = gapThesis(s);
  panel.innerHTML =
    '<div class="insight-row"><div class="insight-body"><div class="insight-label">Market Reference</div><div class="insight-val">Industry growth: ' + growth + '</div></div></div>' +
    '<div class="insight-row"><div class="insight-body"><div class="insight-label">Average Earnings</div><div class="insight-val">' + avgEarnings + '</div></div></div>' +
    '<div class="insight-row"><div class="insight-body"><div class="insight-label">Average Cost of Entry</div><div class="insight-val">Est. startup cost: ' + costStr + '</div></div></div>' +

    '<div class="insight-row"><div class="insight-body"><div class="insight-label">Gap Thesis</div><div class="insight-val insight-thesis">' + thesis + '</div></div></div>';

// Float map — region highlight zones
function renderFloatMap() {
  const g = document.getElementById('floatMarkers');
  if (!g) return;
  const zones = [
    { key:'asia',        cx:1560, cy:390, rx:280, ry:200 },
    { key:'europe',      cx:1050, cy:270, rx:160, ry:130 },
    { key:'americas',    cx:310,  cy:400, rx:210, ry:270 },
    { key:'middle_east', cx:1165, cy:430, rx:130, ry:100 }
  ];
  g.innerHTML = zones.map(function(z) {
    return '<g class="region-zone" data-region="' + z.key + '" onclick="selectRegion(\'' + z.key + '\')" style="cursor:pointer">' +
      '<ellipse class="zone-fill" cx="' + z.cx + '" cy="' + z.cy + '" rx="' + z.rx + '" ry="' + z.ry + '" />' +
      '<ellipse class="zone-border" cx="' + z.cx + '" cy="' + z.cy + '" rx="' + z.rx + '" ry="' + z.ry + '" />' +
    '</g>';
  }).join('');
}

function highlightMapDot(origin) {
  const g = document.getElementById('floatMarkers');
  if (!g) return;
  const norm = regionFilterKey(origin);
  g.querySelectorAll('.region-zone').forEach(function(zone) {
    const r = zone.dataset.region;
    const active = r === norm;
    zone.classList.toggle('zone-active', active);
    zone.classList.toggle('zone-dim', !active);
  });
}

function resetMapDots() {
  const g = document.getElementById('floatMarkers');
  if (!g) return;
  g.querySelectorAll('.region-zone').forEach(function(zone) {
    zone.classList.remove('zone-active','zone-dim');
  });
}

function syncRegionBubble(regionKey) {
  document.querySelectorAll('.chip-btn-g[data-filter]').forEach(function(btn) {
    const filter = btn.dataset.filter;
    if (['asia','europe','middle_east','americas'].includes(filter)) {
      btn.classList.toggle('region-selected', filter === regionKey);
    } else {
      btn.classList.remove('region-selected');
    }
  });
}

function applyRegionFocus(regionKey, options) {
  const opts = options || {};
  const key = regionFilterKey(regionKey);
  highlightMapDot(key);
  document.querySelectorAll('#cards-grid .signal-card, #cards-grid .media-card-g').forEach(function(card) {
    const reg = regionFilterKey(card.dataset.origin || '');
    const match = reg === key;
    card.classList.toggle('region-highlight', match);
    card.classList.toggle('region-dim', !match);
  });
  if (opts.syncBubble !== false) syncRegionBubble(key);
  window._activeRegion = key;
}

function clearRegionFocus(options) {
  const opts = options || {};
  resetMapDots();
  document.querySelectorAll('#cards-grid .signal-card, #cards-grid .media-card-g').forEach(function(card) {
    card.classList.remove('region-highlight', 'region-dim');
  });
  if (!opts.keepActiveBubble) syncRegionBubble(null);
  window._activeRegion = null;
}

function selectRegion(key) {
  const regionKey = regionFilterKey(key);
  if (window._activeRegion === regionKey) { clearRegionSelect(); return; }
  applyRegionFocus(regionKey, { syncBubble: true });
}
function clearRegionSelect() {
  clearRegionFocus({ keepActiveBubble: false });
}
function toggleFloatMap() {
  const panel = document.getElementById('mapFloatPanel');
  const toggle = document.getElementById('mapFloatToggle');
  if (!panel) return;
  const isCollapsed = panel.classList.toggle('collapsed');
  if (toggle) toggle.textContent = isCollapsed ? '\u25bc' : '\u25b2';
}

// Patch keepCard to also refresh saves grid
function keepCard(id) {
  const s = signals.find(x => x.id === id);
  if (s) { s._saved = true; }
  renderGapSaves();
  openSaveModal(id);
}

function applySignalFeed(data, announce) {
  const normalized = normalizeIncomingFeed(data || {});
  signals = normalized.signals || [];
  keptSignals = signals.map(function(s) { return { ...s, status: 'Kept' }; });
  uiState = loadUiState();
  uiState.mapRegion = normalizeRegion(uiState.mapRegion);
  uiState.hubSignalId = normalizeHubSignalId(uiState.hubSignalId);
  const luEl = document.getElementById('meta-updated');
  if (luEl && normalized.meta && normalized.meta.last_updated) {
    luEl.textContent = 'Updated ' + normalized.meta.last_updated;
  }
  renderHub();
  filterByRegion(uiState.mapRegion);
  renderGapCards();
  renderGapQueue();
  renderGapSaves();
  renderFloatMap();
  if (uiState.hubSignalId !== null) {
    showDetail(uiState.hubSignalId);
  }
  if (announce) {
    showToast('Refresh complete');
  }
  gapLog('GAP initialized — ' + signals.length + ' signals loaded');
}

function refreshSignalFeed() {
  const feedUrl = getFeedEndpoint();
  showToast('Pulling new alpha…');
  fetch(feedUrl, { cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) throw new Error('Feed returned ' + r.status);
      return r.json();
    })
    .then(function(data) {
      applySignalFeed(data, true);
    })
    .catch(function(err) {
      gapLog('Live feed error: ' + err.message);
      if (feedUrl === DEFAULT_FEED_URL) {
        renderGapCards();
        return;
      }
      fetch(DEFAULT_FEED_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          applySignalFeed(data, false);
          showToast('Live feed unavailable — sample feed loaded');
        })
        .catch(function(fallbackErr) {
          gapLog('Data load error: ' + fallbackErr.message);
          renderGapCards();
        });
    });
}

// Init gap features after existing restoreUiState
function restoreUiState() {
  refreshSignalFeed();
}

restoreUiState();
